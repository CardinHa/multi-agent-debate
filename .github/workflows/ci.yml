name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev and server extras
        run: pip install -e ".[dev,server]"

      # Fast-fail guard: the default model must not be a known-retired ID.
      # (Also covered by tests/test_model_freshness.py in the suite below.)
      - name: Model ID freshness guard
        run: python -m pytest -q tests/test_model_freshness.py

      - name: Run test suite
        run: python -m pytest -q
